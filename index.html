<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla Bean R</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link href="style.css" rel="stylesheet">
</head>

<body>

<div class="app-wrapper">

  <!-- ===================== -->
  <!-- SIDEBAR -->
  <!-- ===================== -->
  <aside class="sidebar">

    <div class="nav-btn mb-5">
      <img src="VANILLA BEAN.png" alt="Logo"
        style="width:100%; height:100%; object-fit:cover; border-radius:inherit;">
    </div>

    <a href="index.html" class="nav-btn active" title="Menu">
      <i class="bi bi-grid-fill fs-5"></i>
    </a>

    <a href="orders.html" class="nav-btn" title="Orders">
      <i class="bi bi-receipt fs-5"></i>
    </a>

    <div class="nav-btn mt-auto" title="Settings">
      <i class="bi bi-gear-wide-connected fs-5"></i>
    </div>

  </aside>

  <!-- ===================== -->
  <!-- MAIN -->
  <!-- ===================== -->
  <main class="main-content">

    <header class="d-flex justify-content-between align-items-center">

      <h2 class="section-title">Vanilla Bean R.</h2>

      <div class="d-flex gap-3 align-items-center">

        <!-- SEARCH -->
        <div class="position-relative">
          <i class="bi bi-search position-absolute"
            style="left:15px; top:12px; color:var(--text-muted)"></i>

          <input type="text" id="searchInput" class="search-input" placeholder="Search menu...">
        </div>

        <span class="greeting-text">
          Hello, <strong>Juan Dela Rhoades</strong>!
        </span>

        <!-- CART -->
        <div class="cart-toggle-btn" onclick="toggleCart()">
          <i class="bi bi-bag-heart"></i>
          <span id="cartCount">0</span>
        </div>

      </div>
    </header>

    <!-- FILTERS -->
    <div class="filter-pills">

      <button class="pill active" onclick="setCategory('all', this)">All Items</button>
      <button class="pill" onclick="setCategory('hot', this)">Hot Coffee</button>
      <button class="pill" onclick="setCategory('cold', this)">Cold Brew</button>
      <button class="pill" onclick="setCategory('pastries', this)">Pastries</button>

      <div class="ms-auto d-flex gap-2">

        <button class="pill btn-builder-custom"
          data-bs-toggle="modal"
          data-bs-target="#builderModal">

          <i class="bi bi-plus-circle-dotted me-2"></i>
          Custom Brew Builder
        </button>

      </div>
    </div>

    <!-- PRODUCTS -->
    <div class="row g-4" id="grid"></div>

  </main>

  <!-- ===================== -->
  <!-- CART -->
  <!-- ===================== -->
  <aside class="cart-panel hidden" id="cartPanel">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-800 m-0">Order List</h4>
      <i class="bi bi-x-lg" onclick="toggleCart()" style="cursor:pointer"></i>
    </div>

    <div id="cartItems" class="flex-grow-1 overflow-auto">
      <div class="text-center mt-5 text-muted small">Cart is empty.</div>
    </div>

    <div class="checkout-area">

      <div class="d-flex justify-content-between mb-2 small fw-bold">
        <span class="text-muted">Subtotal</span>
        <span id="subtotal">₱0.00</span>
      </div>

      <div class="d-flex justify-content-between align-items-center">
        <span style="font-weight:800; font-size:1.2rem;">Total</span>
        <span id="total" style="font-weight:800; font-size:1.2rem; color:var(--accent);">
          ₱0.00
        </span>
      </div>

      <button class="btn-pay" onclick="processPayment()">
        PROCEED TO PAY
      </button>

    </div>

  </aside>

</div>

<!-- ===================== -->
<!-- BUILDER MODAL (UPDATED) -->
<!-- ===================== -->
<div class="modal fade" id="builderModal" tabindex="-1">

  <div class="modal-dialog modal-dialog-centered modal-lg">

    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header border-0">
        <div>
          <h4 class="fw-bold m-0">Custom Brew Builder</h4>
          <p class="text-muted small m-0">Build your perfect drink</p>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <!-- DRINK OPTIONS -->
        <div class="row mb-4">

          <!-- SIZE -->
          <div class="col-md-4">
            <h6 class="fw-bold text-muted small">SIZE</h6>
            <div class="d-flex gap-2">
              <button class="size-btn btn btn-outline-dark w-100" id="size-S" onclick="setSize('S')">S</button>
              <button class="size-btn btn btn-outline-dark w-100 active" id="size-M" onclick="setSize('M')">M</button>
              <button class="size-btn btn btn-outline-dark w-100" id="size-L" onclick="setSize('L')">L</button>
            </div>
          </div>

          <!-- ICE -->
          <div class="col-md-4">
            <h6 class="fw-bold text-muted small">ICE LEVEL</h6>
            <div class="d-flex gap-2 flex-wrap">
              <button class="ice-btn btn btn-outline-dark w-100 active" id="ice-100%" onclick="setIce('100%')">100%</button>
              <button class="ice-btn btn btn-outline-dark w-100" id="ice-50%" onclick="setIce('50%')">50%</button>
              <button class="ice-btn btn btn-outline-dark w-100" id="ice-0%" onclick="setIce('0%')">No Ice</button>
            </div>
          </div>

          <!-- SUGAR -->
          <div class="col-md-4">
            <h6 class="fw-bold text-muted small">SUGAR</h6>
            <div class="d-flex gap-2 flex-wrap">
              <button class="sugar-btn btn btn-outline-dark w-100" id="sugar-0%" onclick="setSugar('0%')">0%</button>
              <button class="sugar-btn btn btn-outline-dark w-100" id="sugar-50%" onclick="setSugar('50%')">50%</button>
              <button class="sugar-btn btn btn-outline-dark w-100 active" id="sugar-100%" onclick="setSugar('100%')">100%</button>
            </div>
          </div>

        </div>

        <hr>

        <!-- INGREDIENTS -->
        <div class="row">

          <div class="col-md-6 border-end">
            <h6 class="fw-bold mb-3 text-muted small">BASE & MILK</h6>
            <div id="baseList"></div>
          </div>

          <div class="col-md-6">
            <h6 class="fw-bold mb-3 text-muted small">SYRUPS & TOPPINGS</h6>
            <div id="extraList"></div>
          </div>

        </div>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer border-0 d-flex justify-content-between">

        <div class="h5 m-0 fw-bold">
          Subtotal:
          <span id="builderSubtotal" style="color:var(--accent)">₱0.00</span>
        </div>

        <button class="btn btn-dark px-5 py-3 rounded-pill fw-bold"
          onclick="addBuilderToCart()">
          Add to Cart
        </button>

      </div>

    </div>

  </div>

</div>

<!-- ===================== -->
<!-- PRODUCT MODAL (DRINKS) -->
<!-- ===================== -->
<div class="modal fade" id="productModal" tabindex="-1">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content p-3">

      <img id="modalImg" class="w-100 mb-2">

      <h5 id="modalTitle"></h5>

      <p class="text-muted small">
        Base Price: <span id="modalBasePrice"></span>
      </p>

      <h6 class="fw-bold">
        Final: <span id="modalFinalPrice"></span>
      </h6>

      <!-- SIZE -->
      <p class="modal-section-title">Size</p>
      <div class="d-flex gap-2 mb-3">
        <button class="size-btn" id="size-S" onclick="setSize('S')">S</button>
        <button class="size-btn" id="size-M" onclick="setSize('M')">M</button>
        <button class="size-btn" id="size-L" onclick="setSize('L')">L</button>
      </div>

      <!-- SUGAR -->
      <p class="modal-section-title">Sugar Level</p>
      <div class="d-flex gap-2 flex-wrap mb-3">
        <button class="sugar-btn" id="sugar-0%" onclick="setSugar('0%')">0%</button>
        <button class="sugar-btn" id="sugar-50%" onclick="setSugar('50%')">50%</button>
        <button class="sugar-btn active" id="sugar-100%" onclick="setSugar('100%')">100%</button>
      </div>

      <button class="btn btn-primary mt-3 w-100"
        onclick="addToCartFromModal()">
        Add to Cart
      </button>

    </div>

  </div>

</div>

<!-- ===================== -->
<!-- SCRIPTS -->
<!-- ===================== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="payment.js"></script>

</body>
</html>
